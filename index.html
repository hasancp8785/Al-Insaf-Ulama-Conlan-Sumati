// SHOW HISTORY
function showHistory(user, historyDiv){
  const month = document.getElementById('monthFilter').value;
  const year = document.getElementById('yearFilter').value;

  const filtered = user.history.filter(item=>{
    const [date] = item.split(' ');
    const [d,m,y] = date.split('/');
    return (month==='all'||m===month)&&(year==='all'||y===year);
  });

  historyDiv.innerHTML = filtered.length
    ? '<ul>'+filtered.map(d=>`<li>${d}</li>`).join('')+'</ul>'
    : '<p>No records</p>';

  historyDiv.style.display='block';
}

// RENDER USERS
function renderUsers(){
  const usersContainer = document.getElementById('users');
  usersContainer.innerHTML='';

  let totalBalanceAll = 0;
  let totalExtraAll = 0;

  users.forEach(user=>{
    let previous = 0;
    let extra = 0;

    user.history.forEach(item=>{
      if(item.includes("Extra Fund")){
        const amount = parseInt(item.split(':')[1]);
        extra += amount;
        previous += amount; // include in total
      } else {
        const amount = parseInt(item.split('-')[1]);
        previous += amount;
      }
    });

    const total = previous;

    totalBalanceAll += total;
    totalExtraAll += extra;

    const card = document.createElement('div');
    card.className='user-card';
    card.innerHTML = `
      <h3>${user.name}</h3>
      <p>Previous Balance: ${previous - extra}</p>
      <p>Extra Fund: ${extra}</p>
      <p>Total Extra Fund: ${extra}</p>
      <p><strong>Total Balance: ${total}</strong></p>
    `;

    const historyDiv = document.createElement('div');
    historyDiv.className='history-box';
    card.appendChild(historyDiv);
    card.onclick = ()=>showHistory(user,historyDiv);

    usersContainer.appendChild(card);
  });

  document.getElementById('totalBalance').innerText = totalBalanceAll;
  document.getElementById('totalExtra').innerText = totalExtraAll;
  document.getElementById('totalExpense').innerText = 0;
  document.getElementById('totalProfit').innerText = 0;
}
